<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deksiak - Linki</title>
    <style>
        /* Dynamiczne, klubowe tło z ruchomymi światłami */
        body {
            background: #0a0514;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(255, 0, 128, 0.35) 0%, transparent 40%);
            background-size: 200% 200%;
            animation: neonPulse 10s ease infinite alternate;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Animacja pulsowania świateł w tle */
        @keyframes neonPulse {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Kontener na całą zawartość strony z efektem przezroczystego szkła */
        .glass-panel {
            background: rgba(15, 10, 30, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 440px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(138, 43, 226, 0.1);
            box-sizing: border-box;
        }

        h1 {
            color: #ffffff;
            font-size: 3.2rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.8), 0 0 30px rgba(0, 191, 255, 0.6);
            letter-spacing: 2px;
            font-weight: 800;
        }

        p {
            color: #d1cffd;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
            width: 100%;
        }

        /* Styl epickich przycisków */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 19px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Przycisk YouTube */
        .btn-yt {
            background: linear-gradient(135deg, #ff003c, #b30022);
            border: 1px solid rgba(255, 0, 60, 0.4);
            box-shadow: 0 6px 20px rgba(255, 0, 60, 0.3);
        }

        .btn-yt:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.8);
        }

        /* Przycisk Discord */
        .btn-dc {
            background: linear-gradient(135deg, #5865F2, #3b45c2);
            border: 1px solid rgba(88, 101, 242, 0.4);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.3);
        }

        .btn-dc:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.8);
        }
    </style>
</head>
<body>

    <!-- Panel główny strony -->
    <div class="glass-panel">
        <h1>Deksiak</h1>
        <p>Wpadaj na moje social media!</p>

        <div class="links-container">
            <a href="https://www.youtube.com/@deksiak2" target="_blank" class="btn btn-yt">KANAŁ YOUTUBE</a>
            <a href="https://discord.gg/6xx76a3Xwh" target="_blank" class="btn btn-dc">SERWER DISCORD</a>
        </div>
    </div>

</body>
</html>
